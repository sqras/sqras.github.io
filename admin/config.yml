backend:
  name: github
  repo: sqras/sqras.github.io
  branch: main

media_folder: images/uploads

collections:
  - name: "projects"
    label: "Проєкти"
    files:
      - name: "projects"
        label: "Список проєктів"
        file: "_data/projects.json"
        fields:
          - name: "projects"
            label: "Проєкти"
            widget: "list"
            fields:
              - { label: "Slug (латиницею, без пробілів)", name: "slug", widget: "string" }
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Короткий опис", name: "description", widget: "text" }
              - { label: "Превью зображення", name: "image", widget: "image", required: false }
              - { label: "GitHub посилання", name: "github_url", widget: "string", required: false }
              - { label: "Live demo посилання", name: "demo_url", widget: "string", required: false }
              - { label: "Категорія", name: "category", widget: "select", options: ["web", "brand", "design"], default: "web" }
              - { label: "Технології", name: "technologies", widget: "list", required: false }
              - { label: "Детальний опис", name: "body", widget: "markdown", required: false }
              - { label: "Галерея", name: "gallery", widget: "list", field: { label: "Зображення", name: "image", widget: "image" }, required: false }
